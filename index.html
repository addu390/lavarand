<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lava Lamp Entropy Wall</title>
  </head>
  <body>
    <canvas id="wall"></canvas>
    <div id="dock">
      <div id="dock-bar" class="shell">
        <button class="dock-tab active" data-tab="panels">Panels</button>
        <button class="dock-tab" data-tab="controls">Controls</button>
        <button id="dock-collapse" aria-label="Toggle dock">&#9662;</button>
      </div>
      <div id="dock-views">
        <aside id="sidebar" class="dock-view"></aside>
        <div id="admin-root" class="dock-view" hidden></div>
      </div>
    </div>
    <div id="flash"></div>
    <div id="hero-hint" hidden>
      click outside the lamp or press Esc to close &middot; click the switch on
      the base to toggle power
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
